# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    ignore_usernames:
      - renovate[bot]
  path_filters:
    - "!schemas-dist/**"
  path_instructions:
    - path: src/**
      instructions: >-
        C# 14 / .NET 10 with Autofac DI and nullable reference types. Do not comment on
        formatting or style; Qodana and CSharpier handle those.
    - path: tests/**
      instructions: >-
        NUnit 4 + NSubstitute + AutoFixture + AwesomeAssertions.
    - path: schemas/**
      instructions: >-
        JSON Schemas are the single source of truth for recyclarr.yml and settings.yml
        validation. Changes here must match corresponding C# model changes in src/.
chat:
  auto_reply: true
