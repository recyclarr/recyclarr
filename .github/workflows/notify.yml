name: Release Notification

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        type: string
        description: The release tag to generate a notification for

env:
  TAG: ${{ github.event.release.tag_name || github.event.inputs.tag_name }}

permissions: read-all

jobs:
  release-comments:
    name: Release Comments
    # The commenter action requires release event context (workflow_dispatch has none)
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RECYCLARR_APP_ID }}
          private-key: ${{ secrets.RECYCLARR_PRIVATE_KEY }}

      - name: Comment on Released Issues
        uses: apexskier/github-release-commenter@e7813a9625eabd79a875b4bc4046cfcae377ab34 # v1.4.1
        with:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          comment-template: |
            🎉 This is included in {release_link}.
          skip-label: renovate

  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Inputs
        run: |
          cat >> $GITHUB_ENV <<"EOL"
          INPUT_TAG="${{ env.TAG }}"
          INPUT_ORG_REPO="${{ github.repository }}"
          EOL

      - name: Get Release Info
        uses: octokit/request-action@b91aabaa861c777dcdb14e2387e30eddf04619ae # v3.0.0
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          route: GET /repos/{org_repo}/releases/tags/{tag}

      # Write changelog to an environment variable to avoid certain characters from being processed
      # by the shell
      - name: Get Information from Release
        env:
          DATA: ${{ steps.release.outputs.data }}
        run: |
          jq -r '.assets[].browser_download_url' <<<"$DATA" > assets.txt
          jq -r '.body' <<<"$DATA" > changelog.txt

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Install Discord Webhook Python Module
        run: pip install "discord-webhook==1.0.0"

      - name: Send Discord Notification
        run: >
          python ci/notify/discord_notify.py
          --version ${{ env.TAG }}
          --repo ${{ github.repository }}
          --webhook-url ${{ secrets.DISCORD_WEBHOOK }}
          --changelog changelog.txt
          --assets assets.txt
