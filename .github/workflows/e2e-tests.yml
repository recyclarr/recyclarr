name: End-to-End Tests

on:
  push:
    branches:
      - "**"
    paths:
      - "src/**"
      - "tests/**"
      - "**.props"
      - "**.targets"
      - "**.slnx"
      - ".config/dotnet-tools.json"
      - "schemas/**"
      - ".github/workflows/e2e-tests.yml"
      - ".github/workflows/reusable-precheck.yml"
      - ".github/actions/**"

  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "**.props"
      - "**.targets"
      - "**.slnx"
      - ".config/dotnet-tools.json"
      - "schemas/**"
      - ".github/workflows/e2e-tests.yml"
      - ".github/workflows/reusable-precheck.yml"
      - ".github/actions/**"

permissions:
  pull-requests: read

jobs:
  #############################################
  pre-check:
    uses: ./.github/workflows/reusable-precheck.yml

  #############################################
  e2e-tests:
    needs: pre-check
    if: needs.pre-check.outputs.should_run == 'true' && github.event.pull_request.user.login != 'renovate[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # avoid shallow clone for GitVersion
          persist-credentials: false

      - name: Setup .NET & Tools
        uses: ./.github/actions/setup-dotnet

      - name: Run E2E Tests
        run: dotnet test tests/Recyclarr.EndToEndTests --filter "TestCategory=E2E" --logger "console;verbosity=detailed"

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-test-results
          path: |
            **/TestResults/**
            /tmp/recyclarr-e2e-*.yml
          if-no-files-found: ignore
